data:
  train_csv: "/workspace/github/pig_posture_kaggle_project/data/multiview_pig_posture_recognition/train2.csv"
  test_csv: "/workspace/github/pig_posture_kaggle_project/data/multiview_pig_posture_recognition/test.csv"
  train_image_dir: "/workspace/github/pig_posture_kaggle_project/data/multiview_pig_posture_recognition/train2_images"
  test_image_dir: "/workspace/github/pig_posture_kaggle_project/data/multiview_pig_posture_recognition/test_images"
  class_names_file: "/workspace/github/pig_posture_kaggle_project/data/multiview_pig_posture_recognition/pig_posture_classes.txt"
  img_size: 320
  pad: 10
  keep_aspect_ratio: true
  prep_n_jobs: 4

split:
  seed: 42
  single_val_ratio: 0.2
  n_folds: 5

model:
  name: "efficientnet_v2_s"
  pretrained: true
  dropout: 0.2

train:
  # Core optimization
  epochs: 20
  batch: 64
  workers: 8
  seed: 42
  lr: 0.0003
  weight_decay: 0.0003
  checkpoint_every_n_epochs: 5

  # LR strategy
  # single: same LR for all trainable params
  # backbone_head: separate LR for backbone and classification head
  # layerwise: stage-wise discriminative LR inside backbone + head
  lr_strategy: "layerwise"

  # Used by backbone_head strategy: backbone_lr = lr * lr_backbone_factor
  lr_backbone_factor: 0.05

  # Used by layerwise strategy:
  # head=lr, late=lr*decay, mid=lr*decay^2, early=lr*decay^3
  lr_layer_decay: 0.25

  # Freeze backbone for first N epochs (head-only warmup)
  freeze_backbone_epochs: 4

  # Regularization
  label_smoothing: 0.08

  # Numeric precision and reproducibility
  precision: "16-mixed"
  deterministic: false

  # Class imbalance handling (YOLO-like behavior)
  # Class weighting power for inverse-frequency loss weighting.
  # 0.0 disables weighting, 1.0 applies full inverse-frequency weighting.
  cls_pw: 0.35

  # Training control
  accumulate_grad_batches: 1
  pin_memory: true
  early_stopping_patience: 8
  early_stopping_min_delta: 0.0005
  log_every_n_steps: 20

augment:
  # Geometric crop policy (keeps random crop area/aspect under control)
  scale_min: 0.75
  scale_max: 1.0
  ratio_min: 0.85
  ratio_max: 1.2

  # Camera viewpoint perturbation
  affine_p: 0.7
  affine_degrees: 15.0
  affine_translate: 0.1
  affine_scale_min: 0.9
  affine_scale_max: 1.1
  affine_shear: 5.0

  # Photometric jitter
  color_p: 0.8
  brightness: 0.60
  contrast: 0.55
  saturation: 0.12
  hue: 0.03

  # Exposure and camera processing perturbation
  gamma_p: 0.35
  gamma_min: 0.6
  gamma_max: 1.4
  autocontrast_p: 0.15
  sharpness_p: 0.15
  sharpness_factor: 1.8

  # Blur and perspective perturbation
  blur_p: 0.15
  perspective: 0.25
  perspective_p: 0.3

  # Random erasing regularization
  erasing_p: 0.18
  erase_scale_min: 0.02
  erase_scale_max: 0.12
  erase_ratio_min: 0.5
  erase_ratio_max: 2.0

  # Evaluation resize ratio before center crop
  eval_resize_ratio: 1.14

inference:
  batch: 128
  workers: 6
  imgsz: 320

wandb:
  enabled: true
  project: "pig-posture-kaggle-SSL"
  entity: null
  mode: "online"
  tags: ["efficientnet", "lightning", "train2", "layerwise_lr", "aug4"]

output:
  root: "data/generated"
  run_name: "train2_strategy_A"
  submission_key: "train2_efficientnet_stratA_aug4"
