data:
  train_csv: "/workspace/github/pig_posture_kaggle_project/data/multiview_pig_posture_recognition/train1.csv"
  test_csv: "/workspace/github/pig_posture_kaggle_project/data/multiview_pig_posture_recognition/test.csv"
  train_image_dir: "/workspace/github/pig_posture_kaggle_project/data/multiview_pig_posture_recognition/train1_images"
  test_image_dir: "/workspace/github/pig_posture_kaggle_project/data/multiview_pig_posture_recognition/test_images"
  img_size: 320
  pad: 10
  keep_aspect_ratio: true
  prep_n_jobs: -1

split:
  seed: 42
  single_val_ratio: 0.2
  n_folds: 5

model:
  weights: "yolo26n-cls.pt"

train:
  epochs: 20
  patience: 10
  save_period: 10
  imgsz: 320
  batch: 0.3
  device: 0
  workers: 6
  cache: true
  val: true
  deterministic: false
  amp: true
  plots: true
  seed: 42
  cls_pw: 0.7
  dropout: 0.2
  cos_lr: true
  close_mosaic: 4

  fliplr: 0.0
  flipud: 0.0
  degrees: 10.0
  shear: 5.0
  perspective: 0.0005
  translate: 0.2

  use_f1_selection: true

wandb:
  enabled: true
  project: "pig-posture-kaggle-SSL"
  entity: null
  mode: "online"
  tags: ["yolo26n", "imgaug", "train1", "f1_selection", "trial1"]

output:
  root: "data/generated"
  # Dataset key
  run_name: "train1_local_run"
  # Strategy key
  submission_key: "train1_yolo26n_imgaug_f1selection_trial1"

inference:
  batch: 128
  chunk: 1000
  imgsz: 320
